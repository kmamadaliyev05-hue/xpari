<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>X-Klon O'yini</title>
    <style>
        body { background: #1a1a1a; display: flex; flex-direction: column; align-items: center; font-family: sans-serif; }
        .grid { display: grid; grid-template-columns: repeat(5, 50px); gap: 10px; margin-top: 50px; }
        .cell { width: 50px; height: 50px; background: #333; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 24px; }
    </style>
</head>
<body>
    <div class="grid" id="game-grid"></div>
    <script>
        const grid = document.getElementById('game-grid');
        for (let i = 0; i < 50; i++) {
            let cell = document.createElement('div');
            cell.className = 'cell';
            cell.onclick = function() {
                // 100% YUTUQ MANTIG'I
                this.innerHTML = '🍎'; // Har doim olma chiqadi
                this.style.background = '#2e7d32'; 
            };
            grid.appendChild(cell);
        }
    </script>
</body>
</html>
