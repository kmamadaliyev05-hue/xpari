<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apple Fortune Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="apple-fortune">
        <canvas class="apple-fortune__canvas"></canvas>

        <div class="apple-fortune__container">
            <header class="apple-fortune-header">
                <button class="apple-fortune-header__btn">
                    <span class="apple-fortune-header__ico"></span>
                </button>
                <div class="apple-fortune-header__info">
                    <span class="apple-fortune-header__text">APPLE FORTUNE</span>
                </div>
            </header>

            <div class="apple-fortune-controls">
                <div class="apple-fortune-controls__container">
                    <div class="apple-fortune-controls__value">
                        <span class="apple-fortune-controls__text">0.00</span>
                    </div>
                    <div class="apple-fortune-controls-btns">
                        <button class="apple-fortune-controls-btns-play">PLAY</button>
                        <button class="apple-fortune-controls-btns-take">
                            <span class="apple-fortune-controls-btns-take__label">TAKE</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
