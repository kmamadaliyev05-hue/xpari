<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Apple of Fortune</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        
        body {
            /* Videodagidek quyuq orman/yashil fon */
            background: radial-gradient(circle at 50% 20%, #0d3820 0%, #031208 80%, #000000 100%);
            color: white;
            display: flex; justify-content: center;
            min-height: 100vh; overflow: hidden;
        }

        #app-container {
            width: 100%; max-width: 400px; height: 100vh;
            display: flex; flex-direction: column;
            position: relative;
        }

        /* YUQORI QISM (Balans) */
        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px; z-index: 10;
        }
        .icon-btn { font-size: 1.2rem; cursor: pointer; color: rgba(255,255,255,0.8); }
        .balance-badge {
            background: rgba(0, 0, 0, 0.4); border-radius: 20px;
            padding: 5px 15px; display: flex; align-items: center; gap: 8px;
            font-weight: 600; font-size: 1rem;
        }
        .plus-btn {
            background: #2ecc71; color: #000; border-radius: 50%;
            width: 22px; height: 22px; display: flex; justify-content: center; align-items: center;
            font-weight: bold; font-size: 0.9rem;
        }
        .title { text-align: center; font-size: 0.75rem; letter-spacing: 1px; color: rgba(255,255,255,0.7); margin-bottom: 10px; }

        /* O'YIN MAYDONI VA KOEFFITSIYENTLAR */
        .game-area {
            flex: 1; display: flex; padding: 0 10px; gap: 8px;
            align-items: flex-end; margin-bottom: 20px;
        }

        /* Chap tomondagi kf lar */
        .multipliers {
            display: flex; flex-direction: column; gap: 4px; width: 65px;
            margin-bottom: 5px; /* Kataklar bilan tenglashish uchun */
        }
        .mult-item {
            height: 42px; display: flex; align-items: center; justify-content: center;
            background: rgba(0, 0, 0, 0.3); border-radius: 8px;
            font-size: 0.8rem; font-weight: bold; color: rgba(255,255,255,0.5);
            transition: all 0.3s;
        }
        .mult-item.active { background: #2e7d32; color: #a5d6a7; }
        .mult-item.passed { color: #2e7d32; }

        /* O'yin Grid */
        .grid {
            flex: 1; display: flex; flex-direction: column; gap: 4px;
        }
        .grid-row {
            display: flex; justify-content: space-between; height: 42px;
        }
        
        /* KATAKLAR DIZAYNI */
        .cell {
            width: 42px; height: 42px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            position: relative; font-size: 24px; transition: opacity 0.3s;
        }
        
        /* Yopiq, o'ynalmagan yog'och katak (tepadagilar) */
        .cell.inactive-log {
            background: radial-gradient(circle at 30% 30%, #5c3a21 0%, #29150b 100%);
            border: 2px solid #1c0e07; box-shadow: inset 0 -3px 0 rgba(0,0,0,0.5);
        }
        
        /* Faol, bosish mumkin bo'lgan katak (ochiqroq rang + savatcha effekti) */
        .cell.active-basket {
            background: radial-gradient(circle at 30% 30%, #a86b32 0%, #613312 100%);
            border: 2px solid #4a250b; box-shadow: inset 0 -3px 0 rgba(0,0,0,0.4);
            cursor: pointer;
        }
        .cell.active-basket::after {
            content: "🍄"; /* Videodagi kichik savatcha detaliga o'xshatish uchun */
            font-size: 16px; opacity: 0.8;
        }

        /* Yutuq olmasi (Yashil orqa fon, qizil olma) */
        .cell.good-apple {
            background: radial-gradient(circle at 30% 30%, #2e7d32 0%, #103612 100%);
            border: 2px solid #09210a; box-shadow: inset 0 0 10px rgba(0,0,0,0.6);
        }
        
        /* Yutqazish olmasi (Qizil orqa fon, chirik olma) */
        .cell.bad-apple {
            background: radial-gradient(circle at 30% 30%, #b71c1c 0%, #4a0909 100%);
            border: 2px solid #280404; box-shadow: inset 0 0 10px rgba(0,0,0,0.6);
        }

        /* YASHIL AYLANA SPINNER (LOADING) */
        .spinner {
            width: 24px; height: 24px; border: 3px solid rgba(0,0,0,0.2);
            border-top-color: #2ecc71; border-radius: 50%;
            animation: spin 0.8s linear infinite; position: absolute;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* PASTKI PANEL (Pul tikish va Yechib olish) */
        .bottom-area {
            background: #111a14; border-top-left-radius: 20px; border-top-right-radius: 20px;
            padding: 15px 20px 25px 20px; box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
            z-index: 10;
        }

        /* Pul tikish holati */
        #betting-panel { display: block; }
        .bet-options { display: flex; justify-content: space-between; color: rgba(255,255,255,0.4); font-size: 0.85rem; font-weight: bold; margin-bottom: 10px; }
        .bet-options span { cursor: pointer; padding: 5px; }
        .bet-input-container { display: flex; background: rgba(255,255,255,0.05); border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); overflow: hidden; }
        .bet-input-container input {
            flex: 1; background: transparent; border: none; color: white;
            font-size: 1.1rem; padding: 12px 15px; outline: none; font-weight: bold;
        }
        .main-btn {
            background: #2e7d32; color: white; border: none; padding: 0 25px;
            font-weight: bold; font-size: 1rem; cursor: pointer; text-transform: uppercase;
        }
        .settings-row { display: flex; justify-content: space-around; margin-top: 15px; color: rgba(255,255,255,0.5); font-size: 0.85rem; font-weight: bold; }
        
        /* O'yin jarayoni holati (Yutuqni olish) */
        #playing-panel { display: none; text-align: center; }
        .current-win-text { font-size: 0.9rem; font-weight: bold; color: white; margin-bottom: 10px; text-transform: uppercase; }
        .cashout-btn {
            width: 100%; background: #27492c; color: white; border: none; border-radius: 8px;
            padding: 15px; font-weight: bold; font-size: 1.1rem; cursor: pointer; text-transform: uppercase;
        }

        /* MODAL (G'ALABA) */
        #modal-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100;
        }
        .modal-title { font-size: 2.5rem; font-weight: bold; color: #76ff03; margin-bottom: 5px; text-shadow: 0 2px 10px rgba(118, 255, 3, 0.4); }
        .modal-subtitle { font-size: 1rem; color: white; margin-bottom: 30px; }
        .modal-restart-btn {
            background: #76ff03; color: #000; border: none; border-radius: 8px;
            padding: 15px 30px; font-weight: bold; font-size: 1rem; cursor: pointer; text-transform: uppercase; width: 90%;
        }
    </style>
</head>
<body>

<div id="app-container">
    <div class="top-bar">
        <div class="icon-btn">❮</div>
        <div>
            <div class="balance-badge">
                <span id="balance-display">64 259 793.21 сўм</span>
                <div class="plus-btn">+</div>
            </div>
        </div>
        <div class="icon-btn">ⓘ</div>
    </div>
    
    <div class="title">APPLE OF FORTUNE</div>

    <div class="game-area">
        <div class="multipliers" id="multipliers">
            </div>
        <div class="grid" id="grid">
            </div>
    </div>

    <div class="bottom-area">
        <div id="betting-panel">
            <div class="bet-options">
                <span onclick="changeBet('min')">MIN</span>
                <span onclick="changeBet('x2')">X2</span>
                <span onclick="changeBet('x/2')">X/2</span>
                <span onclick="changeBet('max')">MAX</span>
            </div>
            <div class="bet-input-container">
                <input type="number" id="bet-input" value="3000">
                <button class="main-btn" onclick="startGame()">O'YNAMOQ</button>
            </div>
            <div class="settings-row">
                <span>⚙ SOZLASHLAR</span>
                <span>⚡ BIR BOSISHDA</span>
            </div>
        </div>

        <div id="playing-panel">
            <div class="current-win-text">HOZIRDAGI YUTUQ: <span id="current-win-display">0</span> СЎМ</div>
            <button class="cashout-btn" onclick="cashout()">YUTUQNI OLISH</button>
        </div>
    </div>

    <div id="modal-overlay">
        <div class="modal-title">G'alaba!</div>
        <div class="modal-subtitle">Sizning yutug'ingiz <span id="modal-win-display"></span> сўм</div>
        <button class="modal-restart-btn" id="modal-restart-btn" onclick="resetGameAndPlay()">QAYTA O'YNASH</button>
    </div>
</div>

<script>
    // SOZLAMALAR VA STATE
    const multipliers = [1.23, 1.54, 1.93, 2.41, 4.02, 6.71, 11.18, 27.97, 69.93, 349.68];
    // Har bir qatorda nechta yomon olma bo'lishi (1xBet qoidasi bo'yicha)
    const badApplesCount = [1, 1, 1, 1, 2, 2, 2, 3, 3, 4];
    
    let balance = 64259793.21;
    let betAmount = 3000;
    let currentRow = 0; // 0 = eng pastki qator
    let currentWin = 0;
    let gameState = 'BETTING'; // 'BETTING', 'PLAYING', 'GAMEOVER'
    let isSpinning = false;
    let userPath = []; // Bosib o'tilgan ustunlar indeksi

    // ELEMENTLAR
    const gridEl = document.getElementById('grid');
    const multEl = document.getElementById('multipliers');
    const balanceDisp = document.getElementById('balance-display');
    const betInput = document.getElementById('bet-input');
    const bettingPanel = document.getElementById('betting-panel');
    const playingPanel = document.getElementById('playing-panel');
    const curWinDisp = document.getElementById('current-win-display');
    const modal = document.getElementById('modal-overlay');
    const modalWinDisp = document.getElementById('modal-win-display');
    const modalBtn = document.getElementById('modal-restart-btn');

    // FORMATLASH FUNKSIYASI (Probellar bilan "сўм")
    function formatMoney(amount) {
        return Math.floor(amount).toString().replace(/\B(?=(\d{3})+(?!\d))/g, " ");
    }

    // MAYDONNI YARATISH (Boshlang'ich holat)
    function buildGrid() {
        gridEl.innerHTML = '';
        multEl.innerHTML = '';
        userPath = [];

        for (let r = 9; r >= 0; r--) {
            // Koeffitsiyentlarni chizish
            const m = document.createElement('div');
            m.className = 'mult-item';
            m.id = `mult-${r}`;
            m.innerText = `x${multipliers[r]}`;
            multEl.appendChild(m);

            // Qatorlarni chizish
            const rowDiv = document.createElement('div');
            rowDiv.className = 'grid-row';
            rowDiv.id = `row-${r}`;
            
            for (let c = 0; c < 5; c++) {
                const cell = document.createElement('div');
                cell.className = 'cell inactive-log';
                cell.dataset.row = r;
                cell.dataset.col = c;
                cell.onclick = () => handleCellClick(r, c, cell);
                rowDiv.appendChild(cell);
            }
            gridEl.appendChild(rowDiv);
        }
        updateBalance();
    }

    function updateBalance() {
        balanceDisp.innerText = formatMoney(balance) + " сўм";
    }

    // PUL TIKISH TUGMALARI (MIN, X2, va h.k)
    function changeBet(type) {
        let val = parseInt(betInput.value) || 0;
        if (type === 'min') val = 3000;
        if (type === 'max') val = 1000000;
        if (type === 'x2') val *= 2;
        if (type === 'x/2') val = Math.max(3000, Math.floor(val / 2));
        betInput.value = val;
    }

    // O'YINNI BOSHLASH ("O'YNAMOQ" bosilganda)
    function startGame() {
        betAmount = parseInt(betInput.value) || 3000;
        if (balance < betAmount) { alert("Balans yetarli emas!"); return; }
        
        balance -= betAmount;
        updateBalance();
        
        gameState = 'PLAYING';
        currentRow = 0;
        currentWin = 0;
        
        // Panellarni almashtirish
        bettingPanel.style.display = 'none';
        playingPanel.style.display = 'block';
        curWinDisp.innerText = formatMoney(betAmount); // Boshida tikilgan pul turadi

        // Eng pastki qatorni faollashtirish
        activateRow(currentRow);
    }

    // QATORNI FAOLLASHTIRISH (O'ynash mumkin holatga keltirish)
    function activateRow(rowIdx) {
        // KF ni yashil qilish
        document.querySelectorAll('.mult-item').forEach(m => m.classList.remove('active'));
        document.getElementById(`mult-${rowIdx}`).classList.add('active');
        document.getElementById(`mult-${rowIdx}`).classList.add('passed');

        // Kataklarni savatcha (bosish mumkin) ko'rinishiga o'tkazish
        const cells = document.querySelectorAll(`.cell[data-row="${rowIdx}"]`);
        cells.forEach(c => {
            c.className = 'cell active-basket';
            c.innerHTML = '';
        });
    }

    // KATAK BOSILGANDA (100% YUTUQ LOGIKASI)
    function handleCellClick(row, col, cellEl) {
        if (gameState !== 'PLAYING' || isSpinning || row !== currentRow) return;
        
        isSpinning = true;
        
        // 1. Spinner (Loading) animatsiyasini qo'yish
        cellEl.innerHTML = '<div class="spinner"></div>';
        
        // 2. 0.8 soniyadan keyin natijani ko'rsatish
        setTimeout(() => {
            // Katakni G'alaba (Qizil olma) qilish
            cellEl.className = 'cell good-apple';
            cellEl.innerHTML = '🍎';
            userPath[row] = col; // Bosilgan joyni eslab qolamiz
            
            // 3. Shu qatordagi QOLGAN 4 ta katakni videodagidek yashirish (g'oyib qilish)
            const rowCells = document.querySelectorAll(`.cell[data-row="${row}"]`);
            rowCells.forEach(c => {
                if (c !== cellEl) c.style.visibility = 'hidden';
            });

            // Yutuqni hisoblash va yangilash
            currentWin = betAmount * multipliers[currentRow];
            curWinDisp.innerText = formatMoney(currentWin);
            
            // Keyingi bosqichga o'tish
            currentRow++;
            
            if (currentRow > 9) {
                // Oxirgi qatordan ham o'tdi = Avtomatik Cashout
                cashout();
            } else {
                activateRow(currentRow);
                isSpinning = false;
            }
        }, 800);
    }

    // YUTUQNI OLISH VA MAYDONNI OCHISH (REVEAL)
    function cashout() {
        if (currentRow === 0) return; // Hali hech narsa yutolmadi
        gameState = 'GAMEOVER';
        
        balance += currentWin;
        updateBalance();

        // Butun maydonni ochib ko'rsatish
        revealBoard();

        // 1 soniyadan so'ng modalni chiqarish (maydonni ko'rib olishlari uchun)
        setTimeout(() => {
            modalWinDisp.innerText = formatMoney(currentWin);
            modalBtn.innerText = `QAYTA O'YNASH (${formatMoney(betAmount)} СЎМ)`;
            modal.style.display = 'flex';
        }, 1000);
    }

    // G'OYIB BO'LGAN KATAKLARNI O'RNIGA QAYTARIB OCHISH
    function revealBoard() {
        for (let r = 0; r <= 9; r++) {
            const cells = Array.from(document.querySelectorAll(`.cell[data-row="${r}"]`));
            const badCount = badApplesCount[r];
            
            // Foydalanuvchi bosgan katak (agar bu qator o'ynalgan bo'lsa)
            const pickedCol = userPath[r] !== undefined ? userPath[r] : -1;
            
            // Qolgan indekslarni aralashtirib, 'badCount' tasiga yomon olma beramiz
            let availableIndices = [0,1,2,3,4].filter(idx => idx !== pickedCol);
            availableIndices.sort(() => 0.5 - Math.random());
            const badIndices = availableIndices.slice(0, badCount);

            cells.forEach((c, idx) => {
                c.style.visibility = 'visible'; // Yashiringanlarni ko'rsatish
                c.innerHTML = '';
                
                if (idx === pickedCol) {
                    c.className = 'cell good-apple';
                    c.innerHTML = '🍎';
                } else {
                    if (badIndices.includes(idx)) {
                        c.className = 'cell bad-apple';
                        c.innerHTML = '🍎'; // Yomon olmani qizil foni orqali bildiramiz
                        // Agar xohlasangiz chirik olma emojisi: c.innerHTML = '🍏';
                    } else {
                        c.className = 'cell good-apple';
                        c.innerHTML = '🍎';
                    }
                }
            });
        }
    }

    // MODAL OYNADAGI "QAYTA O'YNASH" TUGMASI
    function resetGameAndPlay() {
        modal.style.display = 'none';
        buildGrid(); // Maydonni tozalash
        startGame(); // Darhol avtomatik o'yinni boshlash
    }

    // Boshlang'ich yuklanish
    buildGrid();
</script>
</body>
</html>
