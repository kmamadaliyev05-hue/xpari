<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Apple of Fortune - Original Clone</title>
    <style>
        /* ASOSIY SOZLAMALAR */
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        
        body {
            /* Chuqur o'rmon (jungle) stili - originalga o'xshash qorong'u yashil va qora fon */
            background-color: #020a05;
            background-image: 
                radial-gradient(circle at 50% 30%, rgba(20, 70, 30, 0.6) 0%, rgba(2, 10, 5, 1) 70%),
                linear-gradient(0deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 100%);
            color: white;
            display: flex; justify-content: center;
            min-height: 100vh; overflow: hidden;
        }

        #app-container {
            width: 100%; max-width: 400px; height: 100vh;
            display: flex; flex-direction: column;
            position: relative;
            background: rgba(0, 0, 0, 0.3); /* Yengil soya */
        }

        /* YUQORI QISM (Balans va Menyu) */
        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px; z-index: 10;
        }
        .icon-btn { font-size: 1.2rem; cursor: pointer; color: rgba(255,255,255,0.8); }
        .balance-badge {
            background: rgba(0, 0, 0, 0.5); border-radius: 20px;
            padding: 5px 15px 5px 20px; display: flex; align-items: center; gap: 12px;
            font-weight: 700; font-size: 1rem; border: 1px solid rgba(255,255,255,0.1);
        }
        .plus-btn {
            background: linear-gradient(180deg, #38e860 0%, #1ba339 100%); color: #000; 
            border-radius: 50%; width: 24px; height: 24px; 
            display: flex; justify-content: center; align-items: center;
            font-weight: bold; font-size: 1rem; box-shadow: 0 0 8px rgba(56, 232, 96, 0.5);
        }
        .title { text-align: center; font-size: 0.8rem; font-weight: bold; letter-spacing: 1px; color: #a5d6a7; margin-bottom: 10px; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }

        /* O'YIN MAYDONI */
        .game-area {
            flex: 1; display: flex; padding: 0 15px; gap: 10px;
            align-items: flex-end; margin-bottom: 25px; justify-content: center;
        }

        /* KOEFFITSIYENTLAR (Chap tomon) */
        .multipliers {
            display: flex; flex-direction: column; gap: 4px; width: 60px;
            margin-bottom: 7px;
        }
        .mult-item {
            height: 40px; display: flex; align-items: center; justify-content: center;
            background: rgba(0, 0, 0, 0.4); border-radius: 6px;
            font-size: 0.8rem; font-weight: 800; color: rgba(255,255,255,0.3);
            transition: all 0.3s ease; border: 1px solid transparent;
        }
        .mult-item.active { 
            background: linear-gradient(90deg, rgba(27,163,57,0.8) 0%, rgba(56,232,96,0.2) 100%);
            color: #fff; border-left: 3px solid #38e860; box-shadow: -2px 0 10px rgba(56,232,96,0.3);
        }
        .mult-item.passed { color: #38e860; text-shadow: 0 0 5px rgba(56,232,96,0.5); }

        /* O'YIN GRID VA KATAKLAR */
        .grid { flex: 1; display: flex; flex-direction: column; gap: 4px; max-width: 250px; }
        .grid-row { display: flex; justify-content: space-between; height: 40px; position: relative; }
        
        /* 3D KATAK (Flip animatsiyasi bilan) */
        .cell {
            width: 40px; height: 40px; position: relative; perspective: 1000px;
            transition: opacity 0.4s ease;
        }
        .cell-inner {
            width: 100%; height: 100%; position: absolute;
            transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
        }
        .cell.flipped .cell-inner { transform: rotateY(180deg); }
        
        .cell-front, .cell-back {
            width: 100%; height: 100%; position: absolute;
            backface-visibility: hidden; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
        }

        /* KATAKNING OLD TOMONI (Yopiq yog'och qopqoq) */
        .cell-front {
            background: radial-gradient(circle at 30% 30%, #684123 0%, #3a1e0b 80%, #1a0c04 100%);
            border: 2px solid #291406; box-shadow: inset 0 -3px 5px rgba(0,0,0,0.8), 0 4px 6px rgba(0,0,0,0.5);
        }
        /* Yog'och teksturasini chizish uchun pseudo-element */
        .cell-front::before {
            content: ''; position: absolute; top: 10%; left: 10%; width: 80%; height: 80%;
            border-radius: 50%; border: 1px dashed rgba(255,255,255,0.1);
        }

        /* AKTIV QATOR KO'RSATKICHI (Miltillovchi sariq chiroq) */
        .cell.active-basket .cell-front { cursor: pointer; border-color: #8c5a2b; }
        .cell.active-basket::after {
            content: ''; position: absolute; bottom: -6px; left: 50%; transform: translateX(-50%);
            width: 20px; height: 6px; background: radial-gradient(ellipse, #ffb300 0%, rgba(255,179,0,0) 70%);
            border-radius: 50%; animation: pulse-glow 1s infinite alternate; z-index: -1;
        }
        @keyframes pulse-glow {
            0% { opacity: 0.5; transform: translateX(-50%) scale(0.8); }
            100% { opacity: 1; transform: translateX(-50%) scale(1.2); }
        }

        /* KATAKNING ORQA TOMONI (Olingan natija) */
        .cell-back { transform: rotateY(180deg); font-size: 20px; box-shadow: inset 0 0 15px rgba(0,0,0,0.8); }
        
        /* Yaxshi olma foni */
        .cell-back.good {
            background: radial-gradient(circle at 50% 50%, #2ecc71 0%, #0c3818 100%);
            border: 2px solid #145c26;
        }
        /* Yomon olma (chirik) foni */
        .cell-back.bad {
            background: radial-gradient(circle at 50% 50%, #e74c3c 0%, #4a0904 100%);
            border: 2px solid #75140b;
        }

        /* LOADING SPINNER */
        .spinner {
            width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.2);
            border-top-color: #ffb300; border-radius: 50%;
            animation: spin 0.8s linear infinite; position: absolute; z-index: 5;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* PASTKI PANEL (Pul tikish va Yechib olish) */
        .bottom-area {
            background: linear-gradient(180deg, #16241a 0%, #0a110c 100%);
            border-top-left-radius: 24px; border-top-right-radius: 24px;
            padding: 20px 20px 30px 20px; box-shadow: 0 -5px 25px rgba(0,0,0,0.7); z-index: 10;
        }

        /* Pul tikish holati */
        #betting-panel { display: block; }
        .bet-options { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .bet-options span { 
            background: rgba(255,255,255,0.05); padding: 8px 12px; border-radius: 8px;
            font-size: 0.75rem; font-weight: 700; color: #a5d6a7; cursor: pointer; transition: 0.2s;
        }
        .bet-options span:active { background: rgba(255,255,255,0.2); transform: scale(0.95); }
        
        .bet-input-container { display: flex; background: #000; border-radius: 12px; border: 1px solid #2a3d30; overflow: hidden; height: 50px; }
        .bet-input-container input {
            flex: 1; background: transparent; border: none; color: white;
            font-size: 1.2rem; padding: 0 15px; outline: none; font-weight: bold; text-align: left;
        }
        .main-btn {
            background: linear-gradient(180deg, #38e860 0%, #1ba339 100%); color: #000; 
            border: none; padding: 0 30px; font-weight: 900; font-size: 1rem; 
            cursor: pointer; text-transform: uppercase; box-shadow: inset 0 2px 0 rgba(255,255,255,0.3);
            transition: 0.2s;
        }
        .main-btn:active { transform: scale(0.98); }
        
        /* O'yin jarayoni holati (Yutuqni olish) */
        #playing-panel { display: none; text-align: center; }
        .current-win-text { font-size: 0.8rem; font-weight: 700; color: #a5d6a7; margin-bottom: 5px; text-transform: uppercase; }
        .current-win-amount { font-size: 2rem; font-weight: 900; color: #fff; margin-bottom: 15px; text-shadow: 0 2px 10px rgba(56,232,96,0.4); }
        .cashout-btn {
            width: 100%; background: linear-gradient(180deg, #ffca28 0%, #ff8f00 100%);
            color: #000; border: none; border-radius: 12px; height: 50px;
            font-weight: 900; font-size: 1.1rem; cursor: pointer; text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(255, 143, 0, 0.4), inset 0 2px 0 rgba(255,255,255,0.4);
            transition: 0.2s;
        }
        .cashout-btn:active { transform: scale(0.98); }

        /* MODAL OYNA (G'ALABA / MAG'LUBIYAT) - Blur effekt bilan */
        #modal-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(5px);
            display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100;
        }
        .modal-content {
            background: radial-gradient(circle, #1a3320 0%, #0a140d 100%); border: 1px solid #38e860;
            border-radius: 20px; padding: 40px 20px; width: 85%; text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8); animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        
        .modal-title { font-size: 2.2rem; font-weight: 900; color: #38e860; margin-bottom: 10px; text-transform: uppercase; text-shadow: 0 0 15px rgba(56, 232, 96, 0.5); }
        .modal-subtitle { font-size: 1rem; color: #a5d6a7; margin-bottom: 25px; }
        .modal-amount { font-size: 2.5rem; color: #fff; font-weight: bold; margin-bottom: 30px; display: block; }
        .modal-restart-btn {
            background: linear-gradient(180deg, #38e860 0%, #1ba339 100%); color: #000; border: none; border-radius: 12px;
            padding: 15px 30px; font-weight: 900; font-size: 1rem; cursor: pointer; text-transform: uppercase; width: 100%;
            box-shadow: inset 0 2px 0 rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>

<div id="app-container">
    <div class="top-bar">
        <div class="icon-btn">❮</div>
        <div>
            <div class="balance-badge">
                <span id="balance-display">64 259 793 сўм</span>
                <div class="plus-btn">+</div>
            </div>
        </div>
        <div class="icon-btn">⚙</div>
    </div>
    
    <div class="title">APPLE OF FORTUNE</div>

    <div class="game-area">
        <div class="multipliers" id="multipliers"></div>
        <div class="grid" id="grid"></div>
    </div>

    <div class="bottom-area">
        <div id="betting-panel">
            <div class="bet-options">
                <span onclick="changeBet('min')">MIN</span>
                <span onclick="changeBet('x2')">X2</span>
                <span onclick="changeBet('x/2')">X/2</span>
                <span onclick="changeBet('max')">MAX</span>
            </div>
            <div class="bet-input-container">
                <input type="number" id="bet-input" value="3000">
                <button class="main-btn" onclick="startGame()">TIKISH</button>
            </div>
        </div>

        <div id="playing-panel">
            <div class="current-win-text">Hozirdagi yutuq</div>
            <div class="current-win-amount"><span id="current-win-display">0</span> СЎМ</div>
            <button class="cashout-btn" onclick="cashout()">YUTUQNI OLISH</button>
        </div>
    </div>

    <div id="modal-overlay">
        <div class="modal-content">
            <div class="modal-title">G'ALABA!</div>
            <div class="modal-subtitle">Sizning yutug'ingiz</div>
            <span class="modal-amount" id="modal-win-display">0</span>
            <button class="modal-restart-btn" id="modal-restart-btn" onclick="resetGameAndPlay()">YANGI O'YIN</button>
        </div>
    </div>
</div>

<script>
    // 1xBet Koeffitsiyentlari va Yomon olmalar soni (qatorlar bo'yicha pastdan tepaga)
    const multipliers = [1.23, 1.54, 1.93, 2.41, 4.02, 6.71, 11.18, 27.97, 69.93, 349.68];
    const badApplesCount = [1, 1, 1, 1, 2, 2, 2, 3, 3, 4];
    
    let balance = 64259793.21;
    let betAmount = 3000;
    let currentRow = 0; // 0 = eng pastki qator (index 0)
    let currentWin = 0;
    let gameState = 'BETTING'; 
    let isSpinning = false;
    let userPath = []; 

    const gridEl = document.getElementById('grid');
    const multEl = document.getElementById('multipliers');
    const balanceDisp = document.getElementById('balance-display');
    const betInput = document.getElementById('bet-input');
    const bettingPanel = document.getElementById('betting-panel');
    const playingPanel = document.getElementById('playing-panel');
    const curWinDisp = document.getElementById('current-win-display');
    const modal = document.getElementById('modal-overlay');
    const modalWinDisp = document.getElementById('modal-win-display');

    function formatMoney(amount) {
        return Math.floor(amount).toString().replace(/\B(?=(\d{3})+(?!\d))/g, " ");
    }
    function updateBalance() {
        balanceDisp.innerText = formatMoney(balance) + " сўм";
    }

    // MAYDONNI YARATISH (Boshlang'ich holat - tepadan pastga chiziladi)
    function buildGrid() {
        gridEl.innerHTML = '';
        multEl.innerHTML = '';
        userPath = [];

        // 9 dan 0 gacha chizamiz (9 eng tepa, 0 eng past)
        for (let r = 9; r >= 0; r--) {
            // Koeffitsiyentlar
            const m = document.createElement('div');
            m.className = 'mult-item';
            m.id = `mult-${r}`;
            m.innerText = `x${multipliers[r]}`;
            multEl.appendChild(m);

            // Qator
            const rowDiv = document.createElement('div');
            rowDiv.className = 'grid-row';
            rowDiv.id = `row-${r}`;
            
            for (let c = 0; c < 5; c++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.row = r;
                cell.dataset.col = c;
                
                // 3D Inner structure
                const inner = document.createElement('div');
                inner.className = 'cell-inner';
                
                const front = document.createElement('div');
                front.className = 'cell-front';
                
                const back = document.createElement('div');
                back.className = 'cell-back'; // Rang keyin beriladi
                
                inner.appendChild(front);
                inner.appendChild(back);
                cell.appendChild(inner);

                cell.onclick = () => handleCellClick(r, c, cell, front, back);
                rowDiv.appendChild(cell);
            }
            gridEl.appendChild(rowDiv);
        }
        updateBalance();
    }

    function changeBet(type) {
        let val = parseInt(betInput.value) || 0;
        if (type === 'min') val = 3000;
        if (type === 'max') val = Math.floor(balance);
        if (type === 'x2') val *= 2;
        if (type === 'x/2') val = Math.max(3000, Math.floor(val / 2));
        betInput.value = val;
    }

    // O'YINNI BOSHLASH
    function startGame() {
        betAmount = parseInt(betInput.value) || 3000;
        if (balance < betAmount) { alert("Balans yetarli emas!"); return; }
        
        balance -= betAmount;
        updateBalance();
        
        gameState = 'PLAYING';
        currentRow = 0;
        currentWin = 0;
        
        bettingPanel.style.display = 'none';
        playingPanel.style.display = 'block';
        curWinDisp.innerText = formatMoney(betAmount);

        activateRow(currentRow);
    }

    // QATORNI FAOLLASHTIRISH
    function activateRow(rowIdx) {
        document.querySelectorAll('.mult-item').forEach(m => m.classList.remove('active'));
        const activeMult = document.getElementById(`mult-${rowIdx}`);
        activeMult.classList.add('active');
        activeMult.classList.add('passed');

        const cells = document.querySelectorAll(`.cell[data-row="${rowIdx}"]`);
        cells.forEach(c => {
            c.classList.add('active-basket');
        });
    }

    // KATAK BOSILGANDA (100% YUTUQ VA FLIP ANIMATSIYA)
    function handleCellClick(row, col, cellEl, frontEl, backEl) {
        if (gameState !== 'PLAYING' || isSpinning || row !== currentRow) return;
        
        isSpinning = true;
        
        // 1. Loading Spinner qo'shish
        const spinner = document.createElement('div');
        spinner.className = 'spinner';
        frontEl.appendChild(spinner);
        
        // 2. Kutilgandan so'ng animatsiya
        setTimeout(() => {
            spinner.remove();
            
            // Orqa fonga yaxshi olma berish
            backEl.classList.add('good');
            backEl.innerHTML = '🍎'; // Yaxshi olma belgisi
            
            // Flip (aylantirish) animatsiyasini ishga tushirish
            cellEl.classList.add('flipped');
            userPath[row] = col;
            
            // Qolgan kataklarni sekin xiralashtirib yo'q qilish (videodagidek)
            const rowCells = document.querySelectorAll(`.cell[data-row="${row}"]`);
            rowCells.forEach(c => {
                c.classList.remove('active-basket'); // Chiroqni o'chirish
                if (c !== cellEl) {
                    setTimeout(() => { c.style.opacity = '0'; }, 300); // 300ms dan keyin g'oyib bo'ladi
                }
            });

            // Yutuqni hisoblash
            currentWin = betAmount * multipliers[currentRow];
            curWinDisp.innerText = formatMoney(currentWin);
            
            currentRow++;
            
            if (currentRow > 9) {
                setTimeout(cashout, 800); // Oxirgi bosqichdan so'ng avtomatik tugatish
            } else {
                setTimeout(() => {
                    activateRow(currentRow);
                    isSpinning = false;
                }, 400); // Keyingi qatorni yoqish
            }
        }, 600); // Originaldagi kabi biroz kutish vaqti
    }

    // YUTUQNI OLISH (REVEAL - OCHILISH)
    function cashout() {
        if (currentRow === 0) return;
        gameState = 'GAMEOVER';
        
        balance += currentWin;
        updateBalance();

        revealBoard();

        // Modalni xiralashgan fon bilan chiqarish
        setTimeout(() => {
            modalWinDisp.innerText = formatMoney(currentWin) + " СЎМ";
            document.getElementById('modal-restart-btn').innerText = `YANGI O'YIN (${formatMoney(betAmount)} СЎМ)`;
            modal.style.display = 'flex';
        }, 1200);
    }

    // O'YIN OXIRIDA BARCHA YASHIRIN OLMALARNI OCHIB KO'RSATISH
    function revealBoard() {
        for (let r = 0; r <= 9; r++) {
            const cells = Array.from(document.querySelectorAll(`.cell[data-row="${r}"]`));
            const badCount = badApplesCount[r];
            const pickedCol = userPath[r] !== undefined ? userPath[r] : -1;
            
            let availableIndices = [0,1,2,3,4].filter(idx => idx !== pickedCol);
            availableIndices.sort(() => 0.5 - Math.random());
            const badIndices = availableIndices.slice(0, badCount);

            cells.forEach((c, idx) => {
                c.style.opacity = '1'; // Yashiringanlarni qaytarish
                
                if (idx !== pickedCol) {
                    const backEl = c.querySelector('.cell-back');
                    
                    if (badIndices.includes(idx)) {
                        backEl.classList.add('bad');
                        // Yomon (yeyilgan/chirik) olma o'rnida red background bilan yashil olma emojisi (ogrizok effekti)
                        backEl.innerHTML = '🍏'; 
                    } else {
                        backEl.classList.add('good');
                        backEl.innerHTML = '🍎';
                    }
                    // Aylanib ochilishi
                    setTimeout(() => {
                        c.classList.add('flipped');
                    }, r * 100); // Pastdan tepaga qarab to'lqinsimon ochiladi
                }
            });
        }
    }

    // MODALNI YOPISH VA QAYTA BOSHLASH
    function resetGameAndPlay() {
        modal.style.display = 'none';
        buildGrid();
        startGame();
    }

    buildGrid();
</script>
</body>
</html>
