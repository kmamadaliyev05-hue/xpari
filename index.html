<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apple Fortune Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="apple-fortune">
        <canvas class="apple-fortune__canvas"></canvas>

        <div class="apple-fortune__container">
            
            <header class="apple-fortune__header">
                <button class="apple-fortune-header__btn apple-fortune-header__btn--sound">
                    <svg class="apple-fortune-header__ico"><use xlink:href="#sound-icon"></use></svg>
                </button>
                <div class="apple-fortune-header__info">
                    <span class="apple-fortune-header__text">O'yin holati</span>
                </div>
            </header>

            <div class="apple-fortune__controls">
                <div class="apple-fortune-controls__container">
                    <div class="apple-fortune-controls__value">
                        <span class="apple-fortune-controls__text">0.00</span>
                    </div>
                    <div class="apple-fortune-controls-btns">
                        <button class="apple-fortune-controls-btns-play">O'ynash</button>
                        <button class="apple-fortune-controls-btns-take">
                            <span class="apple-fortune-controls-btns-take__label">Olish</span>
                        </button>
                    </div>
                </div>
            </div>

        </div>

        <div class="apple-fortune__overlay">
            <div class="apple-fortune-popup">
                <div class="apple-fortune-popup__bets">
                    <div class="apple-fortune-popup-bets">
                        <button class="apple-fortune-popup-bets__close">X</button>
                        <div class="apple-fortune-popup-bets__container">
                            <button class="apple-fortune-popup-bets-play">Tikishni boshlash</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
