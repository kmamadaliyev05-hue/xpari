<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apple of Fortune</title>
    <style>
        /* Asosiy sozlamalar */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Arial', sans-serif;
        }

        body {
            background-color: #0b2413;
            /* Fonga o'rmon rasmi qo'yish maqsadga muvofiq, hozircha mos gradient */
            background: linear-gradient(180deg, #0f301d 0%, #081a0e 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .game-wrapper {
            width: 100%;
            max-width: 480px;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
            background-image: radial-gradient(circle at 50% 50%, rgba(30, 80, 45, 0.4) 0%, transparent 70%);
        }

        /* Yuqori qism */
        .header {
            text-align: center;
            padding: 15px 0;
            font-size: 14px;
            font-weight: bold;
            color: #d4e0d9;
            letter-spacing: 1px;
            z-index: 10;
        }

        /* O'yin maydoni */
        .board-area {
            flex-grow: 1;
            position: relative;
            overflow: hidden; /* Skrollni yashirish uchun */
            padding: 0 15px;
            display: flex;
            align-items: flex-end; /* Pastdan boshlanishi uchun */
        }

        /* Harakatlanuvchi doska */
        .board {
            width: 100%;
            display: flex;
            flex-direction: column-reverse; /* Qatorlar pastdan tepaga */
            transition: transform 0.5s ease-in-out;
            padding-bottom: 20px;
        }

        /* Har bir qator */
        .row {
            display: flex;
            align-items: center;
            height: 55px; /* Kataklar balandligi */
            margin-bottom: 5px;
            opacity: 0.6;
            transition: opacity 0.3s, transform 0.3s;
        }

        .row.active {
            opacity: 1;
        }
        
        .row.passed {
             opacity: 0.8;
        }

        /* Koeffitsiyentlar */
        .multiplier {
            width: 60px;
            font-size: 12px;
            font-weight: bold;
            color: #799a84;
            text-align: right;
            padding-right: 15px;
            flex-shrink: 0;
            transition: color 0.3s, background-color 0.3s, transform 0.3s;
            border-radius: 12px;
            padding: 4px 10px 4px 0;
        }

        .row.active .multiplier {
            color: #ffffff;
            background-color: rgba(69, 153, 50, 0.3);
            border: 1px solid #459932;
        }

        /* Kataklar konteyneri */
        .cells {
            display: flex;
            flex-grow: 1;
            justify-content: space-between;
        }

        /* Alohida katak */
        .cell {
            width: 18%;
            aspect-ratio: 1;
            position: relative;
            cursor: pointer;
            border-radius: 50%;
            /* Boshlang'ich yog'och teksturasi uslubi */
            background: radial-gradient(circle at 30% 30%, #a46d3f, #6d3e1c);
            box-shadow: inset -2px -2px 5px rgba(0,0,0,0.5), 0 3px 5px rgba(0,0,0,0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s;
        }
        
        /* Yog'och chiziqlari imitatsiyasi */
        .cell::before {
             content: '';
             position: absolute;
             width: 100%;
             height: 100%;
             border-radius: 50%;
             background-image: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 5px,
                rgba(0,0,0,0.1) 5px,
                rgba(0,0,0,0.1) 10px
            );
             opacity: 0.3;
        }

        /* Katak faol bo'lmaganda ustiga bosishni o'chirish */
        .row:not(.active) .cell {
            pointer-events: none;
        }

        /* Ochilgan yutuq katagi */
        .cell.opened-win {
            background: #1a4221;
            box-shadow: inset 0 0 10px #000, 0 0 15px rgba(76, 175, 80, 0.5);
            border: 2px solid #4caf50;
        }

        /* Ochilgan yutqazgan katak (ko'rinish uchun, garchi 100% yutuq bo'lsa ham oxirida ko'rsatishga kerak) */
        .cell.opened-lose {
            background: #421a1a;
            box-shadow: inset 0 0 10px #000;
        }

        /* Olma rasmlari uchun SVG */
        .apple-svg {
            width: 70%;
            height: 70%;
            display: none;
            z-index: 2;
        }

        .cell.opened-win .apple-svg.good,
        .cell.opened-lose .apple-svg.bad {
            display: block;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            80% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Yuklanish animatsiyasi */
        .loading-spinner {
            position: absolute;
            width: 30px;
            height: 30px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-top-color: #4caf50;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
            z-index: 3;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Pastki panel */
        .bottom-panel {
            background-color: #0d2112;
            padding: 15px 20px;
            border-top: 2px solid #1a3821;
            z-index: 10;
        }

        .status-text {
            text-align: center;
            font-size: 14px;
            color: #a0c2af;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .win-amount {
            font-size: 24px;
            font-weight: bold;
            color: #ffffff;
        }

        .action-button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            text-transform: uppercase;
            transition: background 0.2s, transform 0.1s;
        }

        .action-button:active {
            transform: scale(0.98);
        }

        /* O'yin boshlanmagan holat tugmasi */
        .btn-start {
            background: #2196F3;
        }

        /* O'yin jarayonidagi tugma */
        .btn-cashout {
            background: linear-gradient(180deg, #4caf50 0%, #2e7d32 100%);
            box-shadow: 0 4px 0 #1b5e20;
        }
        
        .btn-disabled {
            background: #555 !important;
            color: #888 !important;
            box-shadow: none !important;
            pointer-events: none;
        }

        /* Natija ekrani (Modal) */
        .result-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s;
        }

        .result-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .result-title {
            font-size: 32px;
            font-weight: bold;
            color: #4caf50;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(76, 175, 80, 0.5);
        }

        .result-subtitle {
            font-size: 16px;
            color: #d4e0d9;
            margin-bottom: 5px;
        }

        .result-amount {
            font-size: 28px;
            font-weight: bold;
            color: white;
            margin-bottom: 30px;
        }

        .btn-restart {
            background: #4caf50;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.4);
        }

    </style>
</head>
<body>

    <svg style="display: none;">
        <symbol id="icon-good-apple" viewBox="0 0 100 100">
            <circle cx="50" cy="55" r="40" fill="url(#appleGrad)" />
            <path d="M30 40 Q40 25 60 30 Q50 35 30 40 Z" fill="rgba(255,255,255,0.3)" />
            <path d="M50 15 Q55 5 65 5" fill="none" stroke="#5c3a21" stroke-width="6" stroke-linecap="round" />
            <path d="M50 15 Q35 5 35 20 Q50 30 50 15 Z" fill="#4caf50" />
            
            <defs>
                <radialGradient id="appleGrad" cx="30%" cy="30%" r="70%">
                    <stop offset="0%" stop-color="#ff5252" />
                    <stop offset="70%" stop-color="#d32f2f" />
                    <stop offset="100%" stop-color="#8e0000" />
                </radialGradient>
            </defs>
        </symbol>

        <symbol id="icon-bad-apple" viewBox="0 0 100 100">
            <path d="M50 15 C70 15 90 30 90 55 C90 80 70 95 50 95 C30 95 10 80 10 55 C10 30 30 15 50 15 Z" fill="#b0b0b0" opacity="0.3"/>
            <path d="M30 90 Q50 100 70 90 C80 60 20 60 30 90 Z" fill="url(#appleGrad)" />
            <path d="M30 20 Q50 10 70 20 C80 40 20 40 30 20 Z" fill="url(#appleGrad)" />
            <rect x="45" y="30" width="10" height="40" fill="#e0cda5" rx="5" />
            <circle cx="48" cy="50" r="3" fill="#3e2723" />
            <circle cx="52" cy="55" r="3" fill="#3e2723" />
            <path d="M50 15 Q55 5 65 5" fill="none" stroke="#5c3a21" stroke-width="6" stroke-linecap="round" />
        </symbol>
    </svg>

    <div class="game-wrapper">
        <div class="header">APPLE OF FORTUNE</div>

        <div class="board-area">
            <div class="board" id="gameBoard">
                </div>
        </div>

        <div class="bottom-panel">
            <div class="status-text" id="statusText">Hozirdagi yutuq: <span class="win-amount" id="currentWin">0 CЎM</span></div>
            <button class="action-button btn-start" id="mainButton">300 000 CЎM O'YNAMOQ</button>
        </div>

        <div class="result-overlay" id="resultModal">
            <div class="result-title" id="modalTitle">G'alaba!</div>
            <div class="result-subtitle">Sizning yutug'ingiz:</div>
            <div class="result-amount" id="modalAmount">0 CЎM</div>
            <button class="btn-restart" id="restartButton">QAYTA O'YNASH</button>
        </div>
    </div>

    <script>
        // O'yin ma'lumotlari (pastdan tepaga)
        const rowsData = [
            { mult: 1.23, badApplesCount: 1 },
            { mult: 1.54, badApplesCount: 1 },
            { mult: 1.93, badApplesCount: 1 },
            { mult: 2.41, badApplesCount: 1 },
            { mult: 4.02, badApplesCount: 2 },
            { mult: 6.71, badApplesCount: 2 },
            { mult: 11.18, badApplesCount: 2 },
            { mult: 27.97, badApplesCount: 3 },
            { mult: 69.93, badApplesCount: 3 },
            { mult: 349.68, badApplesCount: 4 }
        ];

        let baseBet = 300000;
        let currentRow = -1; // -1 = o'yin boshlanmagan
        let isPlaying = false;
        let isProcessing = false; // Animatsiya paytida bosishni oldini olish

        const boardEl = document.getElementById('gameBoard');
        const mainBtn = document.getElementById('mainButton');
        const currentWinEl = document.getElementById('currentWin');
        const statusTextEl = document.getElementById('statusText');
        
        const modal = document.getElementById('resultModal');
        const modalTitle = document.getElementById('modalTitle');
        const modalAmount = document.getElementById('modalAmount');
        const restartBtn = document.getElementById('restartButton');

        // Doskani yaratish
        function initBoard() {
            boardEl.innerHTML = '';
            boardEl.style.transform = 'translateY(0)';
            
            rowsData.forEach((data, rowIndex) => {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'row';
                rowDiv.id = `row-${rowIndex}`;

                const multDiv = document.createElement('div');
                multDiv.className = 'multiplier';
                multDiv.textContent = `x${data.mult}`;
                rowDiv.appendChild(multDiv);

                const cellsDiv = document.createElement('div');
                cellsDiv.className = 'cells';

                // 100% yutish algoritmi uchun bizga maxsus mantiq kerak emas.
                // Qaysi birini bossa ham "good" qilib ochamiz.
                // Lekin oxirida doskani to'liq ochganda boshqalari "bad" bo'lishi uchun oldindan holat tayyorlaymiz.
                
                // Tasodifiy yomon olmalar joylashuvini aniqlash (o'yin oxiri uchun)
                let cellTypes = ['good', 'good', 'good', 'good', 'good'];
                // Yomon olmalarni joylashtirish
                let placedBad = 0;
                while(placedBad < data.badApplesCount) {
                    let randIndex = Math.floor(Math.random() * 5);
                    if(cellTypes[randIndex] === 'good') {
                        cellTypes[randIndex] = 'bad';
                        placedBad++;
                    }
                }

                for (let i = 0; i < 5; i++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    // Haqiqiy holatini datada saqlaymiz, lekin yutqazmasligi uchun klik paytida o'zgartiramiz
                    cell.dataset.realType = cellTypes[i]; 
                    
                    // Yuklanish animatsiyasi
                    const spinner = document.createElement('div');
                    spinner.className = 'loading-spinner';
                    
                    // Butun olma
                    const svgGood = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                    svgGood.setAttribute('class', 'apple-svg good');
                    svgGood.innerHTML = '<use href="#icon-good-apple"></use>';
                    
                    // Tishlangan olma
                    const svgBad = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                    svgBad.setAttribute('class', 'apple-svg bad');
                    svgBad.innerHTML = '<use href="#icon-bad-apple"></use>';

                    cell.appendChild(spinner);
                    cell.appendChild(svgGood);
                    cell.appendChild(svgBad);

                    cell.onclick = () => handleCellClick(rowIndex, i, cell);
                    cellsDiv.appendChild(cell);
                }

                rowDiv.appendChild(cellsDiv);
                boardEl.appendChild(rowDiv);
            });
        }

        // O'yinni boshlash
        function startGame() {
            isPlaying = true;
            currentRow = 0;
            currentWinEl.textContent = '0 CЎM';
            statusTextEl.innerHTML = `Hozirdagi yutuq: <span class="win-amount" id="currentWin">0 CЎM</span>`;
            
            initBoard();
            updateRowVisuals();

            // Tugmani yangilash (birinchi yutuqgacha olinmaydi)
            mainBtn.className = 'action-button btn-disabled';
            mainBtn.textContent = 'YUTUQNI OLISH';
        }

        // Qatorlar holatini yangilash (aktiv/passiv)
        function updateRowVisuals() {
            for (let i = 0; i < rowsData.length; i++) {
                const row = document.getElementById(`row-${i}`);
                row.className = 'row'; // reset
                
                if (i === currentRow) {
                    row.classList.add('active');
                } else if (i < currentRow) {
                    row.classList.add('passed');
                }
            }

            // Doskani tepaga surish (avtomatik skroll)
            if (currentRow > 3) { // 4-qatordan boshlab ekran suriladi
                const shiftY = (currentRow - 3) * 60; // 60px bu row height + margin
                boardEl.style.transform = `translateY(${shiftY}px)`;
            }
        }

        // Katak bosilganda
        function handleCellClick(rIndex, cIndex, cellElement) {
            // Faqat faol qator va o'yin ketyotgan bo'lsa
            if (!isPlaying || isProcessing || rIndex !== currentRow) return;

            isProcessing = true;
            
            // 100% YUTISH KAFOLATI: Agar kullanuvchi bosgan katak aslida "bad" bo'lsa,
            // uni "good" ga aylantiramiz va shu qatordagi boshqa "good" lardan birini "bad" qilamiz.
            if(cellElement.dataset.realType === 'bad') {
                cellElement.dataset.realType = 'good';
                const rowCells = document.getElementById(`row-${rIndex}`).querySelectorAll('.cell');
                
                // Bitta 'good' ni topib 'bad' ga aylantiramiz (o'yin oxirida to'g'ri son ko'rinishi uchun)
                let swapped = false;
                rowCells.forEach((c, idx) => {
                    if(!swapped && idx !== cIndex && c.dataset.realType === 'good') {
                        c.dataset.realType = 'bad';
                        swapped = true;
                    }
                });
            }

            // 1. Yuklanish animatsiyasi yoqiladi
            const spinner = cellElement.querySelector('.loading-spinner');
            spinner.style.display = 'block';
            cellElement.style.background = 'transparent'; // yog'och teksturani yo'qotish
            cellElement.style.border = '2px solid rgba(255,255,255,0.5)';

            // 2. Biroz vaqt o'tgach (videodagidek simulatsiya) katak ochiladi
            setTimeout(() => {
                spinner.style.display = 'none';
                
                // Doim yutuq!
                cellElement.classList.add('opened-win');
                cellElement.style.border = ''; // reset border

                // Yutuqni hisoblash
                const winValue = Math.floor(baseBet * rowsData[currentRow].mult);
                document.getElementById('currentWin').textContent = formatMoney(winValue) + ' CЎM';

                // Tugmani faollashtirish
                mainBtn.className = 'action-button btn-cashout';
                mainBtn.textContent = 'YUTUQNI OLISH';

                // Agar oxirgi qator bo'lsa, g'alaba
                if (currentRow === rowsData.length - 1) {
                    setTimeout(() => finishGame(true, winValue), 800);
                } else {
                    // Keyingi qatorga o'tish
                    currentRow++;
                    isProcessing = false;
                    updateRowVisuals();
                }

            }, 600); // 0.6 soniya kutish
        }

        // O'yinni tugatish va qolganini ochish
        function finishGame(isWin, amount) {
            isPlaying = false;
            
            // Butun doskani ochib ko'rsatish
            revealBoard();

            setTimeout(() => {
                modalTitle.textContent = "G'alaba!";
                modalAmount.textContent = formatMoney(amount) + ' CЎM';
                modal.classList.add('show');
            }, 1000);
        }

        // O'yin oxirida qolgan barcha kataklarni ochish
        function revealBoard() {
            for (let i = 0; i <= (currentRow >= rowsData.length ? rowsData.length-1 : currentRow); i++) {
                const row = document.getElementById(`row-${i}`);
                row.classList.add('active'); // Hammasi to'liq ko'rinadi
                
                const cells = row.querySelectorAll('.cell');
                cells.forEach(cell => {
                    // Agar allaqachon ochilmagan bo'lsa
                    if (!cell.classList.contains('opened-win')) {
                        // Orqa fonni tozalash
                        cell.style.background = 'transparent';
                        cell.style.border = 'none';
                        cell.style.boxShadow = 'none';

                        if (cell.dataset.realType === 'good') {
                            cell.classList.add('opened-win');
                        } else {
                            cell.classList.add('opened-lose');
                        }
                    }
                });
            }
        }

        // Pulni yechib olish tugmasi
        mainBtn.addEventListener('click', () => {
            if (!isPlaying && currentRow === -1) {
                // O'yinni boshlash
                startGame();
            } else if (isPlaying && currentRow > 0 && !isProcessing) {
                // Yutuqni olish
                const winValue = Math.floor(baseBet * rowsData[currentRow - 1].mult);
                finishGame(true, winValue);
            }
        });

        // Qayta o'ynash
        restartBtn.addEventListener('click', () => {
            modal.classList.remove('show');
            // Boshlang'ich holatga qaytish
            currentRow = -1;
            mainBtn.className = 'action-button btn-start';
            mainBtn.textContent = '300 000 CЎM O\'YNAMOQ';
            statusTextEl.innerHTML = '';
            initBoard();
        });

        // Raqamlarni formatlash (1000000 -> 1 000 000)
        function formatMoney(num) {
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, " ");
        }

        // Dastlabki yuklanish
        initBoard();

    </script>
</body>
</html>
