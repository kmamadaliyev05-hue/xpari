<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apple of Fortune</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: radial-gradient(circle at center, #1a4221 0%, #0a1c0e 100%);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Asosiy Mobil Ekran */
        .game-container {
            width: 100%;
            max-width: 430px;
            height: 92vh;
            background: url('https://images.unsplash.com/photo-1542273917363-3b1817f69a2d?q=80&w=1000&auto=format&fit=crop') center/cover no-repeat;
            position: relative;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            border: 4px solid #2e5334;
            overflow: hidden;
        }

        .game-container::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(10,28,14,0.4) 0%, rgba(10,28,14,0.85) 100%);
            z-index: 1;
        }

        /* Yuqori qism */
        .header {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 15px 0;
            background: rgba(0, 0, 0, 0.4);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .header h1 {
            font-size: 18px;
            letter-spacing: 2px;
            color: #e2b34c;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        /* Skroll bo'ladigan O'yin maydoni */
        .board-viewport {
            flex: 1;
            overflow-y: auto;
            position: relative;
            z-index: 2;
            padding: 20px 10px;
            display: flex;
            flex-direction: column-reverse; /* Qatorlar pastdan tepaga joylashadi */
            scroll-behavior: smooth;
        }

        /* Skrollbarni yashirish */
        .board-viewport::-webkit-scrollbar {
            width: 0px;
        }

        /* Qator dizayni */
        .row {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            opacity: 0.5;
            pointer-events: none;
            transition: all 0.4s ease;
            padding: 4px;
            border-radius: 40px;
        }

        .row.active {
            opacity: 1;
            pointer-events: auto;
            background: rgba(226, 179, 76, 0.15);
            box-shadow: inset 0 0 15px rgba(226, 179, 76, 0.3);
        }

        .row.passed {
            opacity: 0.85;
        }

        /* Koeffitsiyent paneli */
        .multiplier {
            width: 65px;
            font-size: 13px;
            font-weight: bold;
            color: #a4cbb7;
            text-align: left;
            padding-left: 5px;
            text-shadow: 1px 1px 3px #000;
            transition: color 0.3s;
        }

        .row.active .multiplier {
            color: #e2b34c;
            font-size: 14px;
            scale: 1.05;
        }

        /* Kataklar guruhi */
        .cells-container {
            flex: 1;
            display: flex;
            justify-content: space-between;
            gap: 6px;
        }

        /* 3D Karta effekti */
        .cell {
            flex: 1;
            aspect-ratio: 1;
            perspective: 1000px;
            cursor: pointer;
        }

        .cell-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
        }

        .cell.flipped .cell-inner {
            transform: rotateY(180deg);
        }

        .cell-front, .cell-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
        }

        /* Yopiq qopqoq (Yog'och dizayn) */
        .cell-front {
            background: radial-gradient(circle, #8a5229 20%, #573116 100%);
            border: 2px solid #b07346;
        }

        .row.active .cell-front:hover {
            transform: scale(1.05);
            border-color: #e2b34c;
        }

        /* Yog'och ichidagi naqsh simulyatsiyasi */
        .cell-front::after {
            content: '';
            width: 75%;
            height: 75%;
            border: 2px dashed rgba(0,0,0,0.25);
            border-radius: 50%;
        }

        /* Ochilgan holat orqa tomoni */
        .cell-back {
            transform: rotateY(180deg);
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid rgba(255,255,255,0.1);
        }

        /* Spinner (Yuklanish animatsiyasi) */
        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #e2b34c;
            animation: spin 0.8s linear infinite;
            position: absolute;
            z-index: 5;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* SVG Elementlar o'lchami */
        .cell svg {
            width: 70%;
            height: 70%;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }

        /* Pastki boshqaruv paneli */
        .control-panel {
            position: relative;
            z-index: 2;
            background: rgba(10, 28, 14, 0.95);
            padding: 15px;
            border-top: 2px solid #2e5334;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .stats-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            color: #a4cbb7;
        }

        .current-win {
            font-size: 18px;
            font-weight: bold;
            color: #e2b34c;
        }

        .action-btn {
            background: linear-gradient(to bottom, #2ea34a, #1b6b2e);
            border: none;
            border-radius: 12px;
            color: white;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(27, 107, 46, 0.4);
            transition: all 0.2s;
            text-align: center;
        }

        .action-btn:active {
            transform: scale(0.98);
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        .action-btn.take-cash {
            background: linear-gradient(to bottom, #e2b34c, #b3851b);
            box-shadow: 0 4px 15px rgba(226, 179, 76, 0.4);
            color: #102615;
        }

        /* Modallar (Yutuq / Mag'lubiyat) */
        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .modal {
            background: linear-gradient(135deg, #1e4225 0%, #0d2111 100%);
            border: 3px solid #e2b34c;
            border-radius: 20px;
            padding: 30px;
            width: 85%;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            transform: scale(0.7);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .overlay.show .modal {
            transform: scale(1);
        }

        .modal h2 {
            font-size: 26px;
            margin-bottom: 10px;
            color: #e2b34c;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .modal p {
            font-size: 15px;
            color: #a4cbb7;
            margin-bottom: 20px;
        }

        .modal .win-amount {
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 25px;
        }

        .restart-btn {
            background: #e2b34c;
            color: #0d2111;
            border: none;
            padding: 12px 25px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }

        /* SVG Ikonkalari Shabloni */
        .hidden-assets {
            display: none;
        }
    </style>
</head>
<body>

    <svg class="hidden-assets">
        <g id="good-apple">
            <circle cx="50" cy="55" r="32" fill="url(#apple-grad)" />
            <path d="M 50 25 C 45 15, 30 20, 35 30 Z" fill="#4ca64c" />
            <path d="M 50 25 Q 52 15 58 12" stroke="#5c3a21" stroke-width="4" fill="none" stroke-linecap="round" />
            <ellipse cx="38" cy="42" rx="5" ry="10" fill="rgba(255,255,255,0.4)" transform="rotate(-15 38 42)" />
            <defs>
                <radialGradient id="apple-grad" cx="35%" cy="35%" r="70%">
                    <stop offset="0%" stop-color="#ff4d4d"/>
                    <stop offset="70%" stop-color="#cc0000"/>
                    <stop offset="100%" stop-color="#660000"/>
                </radialGradient>
            </defs>
        </g>
        
        <g id="bad-apple">
            <path d="M 28 32 C 35 22, 65 22, 72 32 C 65 42, 35 42, 28 32 Z" fill="#8a1a1a" />
            <path d="M 28 78 C 35 68, 65 68, 72 78 C 65 88, 35 88, 28 78 Z" fill="#8a1a1a" />
            <rect x="47" y="30" width="6" height="50" fill="#d9c29e" rx="2" />
            <path d="M 28 32 C 38 35, 38 75, 28 78 C 42 70, 42 40, 28 32 Z" fill="#f5edd5" />
            <path d="M 72 32 C 62 35, 62 75, 72 78 C 58 70, 58 40, 72 32 Z" fill="#f5edd5" />
            <ellipse cx="44" cy="52" rx="2" ry="4" fill="#331a00" />
            <ellipse cx="56" cy="58" rx="2" ry="4" fill="#331a00" />
            <path d="M 50 24 Q 53 14 60 10" stroke="#4a2e1b" stroke-width="3" fill="none" />
        </g>
    </svg>

    <div class="game-container">
        <div class="header">
            <h1>APPLE OF FORTUNE</h1>
        </div>

        <div class="board-viewport" id="boardViewport">
            </div>

        <div class="control-panel">
            <div class="stats-row">
                <span>Garov miqdori: <strong style="color: #fff;">300 000 SŪM</strong></span>
                <div>Hozirgi yutuq: <span class="current-win" id="currentWinTxt">0 SŪM</span></div>
            </div>
            <button class="action-btn" id="mainActionBtn">O'YINNI BOSHLASH</button>
        </div>

        <div class="overlay" id="resultOverlay">
            <div class="modal">
                <h2 id="modalTitle">Omadsizlik</h2>
                <p id="modalDesc">Yana bir bor urinib ko'ring</p>
                <div class="win-amount" id="modalWinAmount">0 SŪM</div>
                <button class="restart-btn" id="modalBtn">QAYTA O'YNASH</button>
            </div>
        </div>
    </div>

    <script>
        // O'yin sozlamalari va koeffitsiyentlari (Pastdan tepaga)
        const CONFIG = [
            { mult: 1.23, badApples: 1 },
            { fill: 1.54, badApples: 1 },
            { mult: 1.93, badApples: 1 },
            { mult: 2.41, badApples: 1 },
            { mult: 4.02, badApples: 2 },
            { mult: 6.71, badApples: 2 },
            { mult: 11.18, badApples: 2 },
            { mult: 27.97, badApples: 3 },
            { mult: 69.93, badApples: 3 },
            { mult: 349.68, badApples: 4 }
        ];

        // To'g'ri koeffitsiyentlar ro'yxatini to'ldirish
        CONFIG[1].mult = 1.54; 

        const BET_AMOUNT = 300000;
        let gameState = 'IDLE'; // IDLE, PLAYING, ENDED
        let currentRowIndex = 0;
        let boardData = [];

        const boardViewport = document.getElementById('boardViewport');
        const mainActionBtn = document.getElementById('mainActionBtn');
        const currentWinTxt = document.getElementById('currentWinTxt');
        const resultOverlay = document.getElementById('resultOverlay');
        const modalTitle = document.getElementById('modalTitle');
        const modalDesc = document.getElementById('modalDesc');
        const modalWinAmount = document.getElementById('modalWinAmount');
        const modalBtn = document.getElementById('modalBtn');

        // Doskani qurish
        function initBoard() {
            boardViewport.innerHTML = '';
            boardData = [];

            CONFIG.forEach((config, rIdx) => {
                const rowEl = document.createElement('div');
                rowEl.className = `row r-${rIdx}`;
                rowEl.dataset.index = rIdx;

                const multEl = document.createElement('div');
                multEl.className = 'multiplier';
                multEl.innerText = `x${config.mult.toFixed(2)}`;
                rowEl.appendChild(multEl);

                const cellsCont = document.createElement('div');
                cellsCont.className = 'cells-container';

                // Ushbu qator uchun olmalarni generatsiya qilish (Tasodifiy joylashtirish)
                let rowSetup = Array(5).fill('good');
                let placedBad = 0;
                while(placedBad < config.badApples) {
                    let randSlot = Math.floor(Math.random() * 5);
                    if(rowSetup[randSlot] === 'good') {
                        rowSetup[randSlot] = 'bad';
                        placedBad++;
                    }
                }
                boardData.push(rowSetup);

                // Katakchalarni yaratish
                for(let cIdx = 0; cIdx < 5; cIdx++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.row = rIdx;
                    cell.dataset.col = cIdx;

                    cell.innerHTML = `
                        <div class="cell-inner">
                            <div class="cell-front"></div>
                            <div class="cell-back"></div>
                        </div>
                        <div class="spinner"></div>
                    `;

                    cell.addEventListener('click', () => handleCellClick(rIdx, cIdx, cell));
                    cellsCont.appendChild(cell);
                }

                rowEl.appendChild(cellsCont);
                boardViewport.appendChild(rowEl);
            });
        }

        // O'yinni ishga tushirish
        function startGame() {
            gameState = 'PLAYING';
            currentRowIndex = 0;
            initBoard();
            updateActiveRow();
            currentWinTxt.innerText = '0 SŪM';
            mainActionBtn.innerText = 'YUTUQNI OLISH';
            mainActionBtn.className = 'action-btn take-cash';
            boardViewport.scrollTop = boardViewport.scrollHeight; // Skrollni eng tagiga tushirish
        }

        // Aktiv qatorni yangilash va skroll qilish
        function updateActiveRow() {
            document.querySelectorAll('.row').forEach((row, idx) => {
                row.classList.remove('active', 'passed');
                if(idx === currentRowIndex && gameState === 'PLAYING') {
                    row.classList.add('active');
                    // Silliq skroll mexanikasi (Aktiv katak doim ko'rinib turishi uchun)
                    setTimeout(() => {
                        row.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }, 100);
                } else if(idx < currentRowIndex) {
                    row.classList.add('passed');
                }
            });
        }

        // Katak bosilgandagi asosiy logika va animatsiya
        function handleCellClick(rIdx, cIdx, cellEl) {
            if(gameState !== 'PLAYING' || rIdx !== currentRowIndex) return;

            const spinner = cellEl.querySelector('.spinner');
            spinner.style.display = 'block';
            
            // Vaqtinchalik bosishni bloklash
            document.querySelector(`.row.r-${rIdx}`).style.pointerEvents = 'none';

            // Tasodifiy yuklanish animatsiyasi vaqti (videodagidek qisqa kutish)
            setTimeout(() => {
                spinner.style.display = 'none';
                const isGood = boardData[rIdx][cIdx] === 'good';
                
                // Faqat tanlangan katakni 3D burib ochish
                const backFace = cellEl.querySelector('.cell-back');
                backFace.innerHTML = `<svg><use href="#${isGood ? 'good-apple' : 'bad-apple'}"></use></svg>`;
                cellEl.classList.add('flipped');

                if(isGood) {
                    // Yutuqni hisoblash
                    const curMult = CONFIG[rIdx].mult;
                    const winAmount = Math.round(BET_AMOUNT * curMult);
                    currentWinTxt.innerText = winAmount.toLocaleString('uz-UZ') + ' SŪM';

                    if(currentRowIndex === 9) {
                        // Eng yuqori cho'qqiga yetganda g'alaba
                        setTimeout(() => endGame(true), 600);
                    } else {
                        currentRowIndex++;
                        gameState = 'PLAYING';
                        updateActiveRow();
                    }
                } else {
                    // Mag'lubiyat holati
                    setTimeout(() => endGame(false), 600);
                }
            }, 500);
        }

        // O'yin yakunlanganda barcha olmalarni bir vaqtda ochish
        function revealFullBoard() {
            const allCells = document.querySelectorAll('.cell');
            allCells.forEach(cell => {
                const r = parseInt(cell.dataset.row);
                const c = parseInt(cell.dataset.col);
                const isGood = boardData[r][c] === 'good';
                
                const backFace = cell.querySelector('.cell-back');
                backFace.innerHTML = `<svg><use href="#${isGood ? 'good-apple' : 'bad-apple'}"></use></svg>`;
                cell.classList.add('flipped');
            });
            // Barcha qatorlarni vizual ochish
            document.querySelectorAll('.row').forEach(r => r.style.opacity = '1');
        }

        // O'yin tugash funksiyasi
        function endGame(isWin) {
            gameState = 'ENDED';
            revealFullBoard();

            let finalWin = 0;
            if(isWin) {
                finalWin = Math.round(BET_AMOUNT * CONFIG[currentRowIndex].mult);
                modalTitle.innerText = "G'alaba!";
                modalDesc.innerText = "Sizning yutug'ingiz:";
                modalWinAmount.innerText = finalWin.toLocaleString('uz-UZ') + ' SŪM';
            } else {
                modalTitle.innerText = "Omadsizlik";
                modalDesc.innerText = "Yana bir bor urinib ko'ring";
                modalWinAmount.innerText = '0 SŪM';
            }

            setTimeout(() => {
                resultOverlay.classList.add('show');
            }, 800);

            resetControls();
        }

        function resetControls() {
            mainActionBtn.innerText = 'O\'YINNI BOSHLASH';
            mainActionBtn.className = 'action-btn';
        }

        // Naqd pulni yechib olish tugmasi bosilganda
        mainActionBtn.addEventListener('click', () => {
            if(gameState === 'IDLE' || gameState === 'ENDED') {
                startGame();
            } else if(gameState === 'PLAYING') {
                if(currentRowIndex > 0) {
                    endGame(true);
                }
            }
        });

        // Qayta o'ynash tugmasi
        modalBtn.addEventListener('click', () => {
            resultOverlay.classList.remove('show');
            startGame();
        });

        // Ilk yuklangandagi holat
        initBoard();
    </script>
</body>
</html>
